name: keycase_server
description: KeyCase identity server — stores and serves cryptographic identity proofs. Self-hostable.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.0.0

dependencies:
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  shelf_static: ^1.1.2
  args: ^2.4.2
  dotenv: ^4.2.0
  postgres: ^3.1.0
  keycase_core:
    path: ../core
  uuid: ^4.0.0
  mime: ^2.0.0
  http_parser: ^4.0.0
  shelf_web_socket: ^3.0.0
  web_socket_channel: ^3.0.0

dev_dependencies:
  test: ^1.24.0
  lints: ^3.0.0
  http: ^1.2.0
